<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ .Title }}{{ if not .IsHome }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ .Description | default .Site.Params.description }}">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.7;max-width:800px;margin:0 auto;padding:40px 20px}
  a{color:#58a6ff;text-decoration:none}
  a:hover{text-decoration:underline}
  header{margin-bottom:60px}
  header nav{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  header nav a:first-child{font-size:1.4em;font-weight:700;color:#e6edf3}
  footer{margin-top:80px;color:#484f58;font-size:.85em}
  h1{font-size:2.2em;margin-bottom:.4em;color:#e6edf3}
  h2{font-size:1.4em;margin:40px 0 16px;color:#e6edf3}
  h3{font-size:1.1em;margin:28px 0 10px}
  p,ul,ol{margin-bottom:16px}
  ul,ol{padding-left:24px}
  blockquote{border-left:3px solid #58a6ff;padding-left:20px;color:#8b949e;margin:20px 0}
  code{background:#161b22;padding:2px 6px;border-radius:4px;font-size:.9em}
  pre{background:#161b22;padding:16px;border-radius:8px;overflow-x:auto;margin:16px 0}
  pre code{background:none;padding:0}
  strong{color:#e6edf3}
  .post-item{margin-bottom:32px}
  .post-item time{color:#484f58;font-size:.85em}
  .post-item h2{margin:6px 0;font-size:1.3em}
  .project-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;margin-bottom:20px}
  .project-card h3{margin:0 0 8px}
  .project-card .lang{color:#8b949e;font-size:.85em;margin-bottom:8px}
  .stats{display:flex;gap:40px;margin:30px 0}
  .stat-num{font-size:2em;font-weight:700;color:#58a6ff}
  .stat-label{color:#8b949e;font-size:.9em}
</style>
